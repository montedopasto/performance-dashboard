<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Avaliação</title>

<link rel="stylesheet" href="style.css">
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard">

    <div class="topbar">
        <div class="logo-area">
            <img src="logo-monte-do-pasto.png" class="app-logo">

            <div>
                <div class="logo-title">Monte do Pasto</div>
                <div class="logo-subtitle">Nova Avaliação</div>
            </div>
        </div>

        <div class="topbar-right">
            <button class="logout-btn" onclick="window.location.href='dashboard.html'">
                Dashboard
            </button>

            <button class="logout-btn" onclick="window.location.href='equipa.html'">
                Equipa
            </button>
        </div>
    </div>

    <div class="team-page-card">

        <div class="section-title">
            Criar Avaliação
        </div>

        <label class="form-label">
            Colaborador
        </label>

        <select id="colaboradorSelect" class="form-select">
            <option value="">A carregar colaboradores...</option>
        </select>

        <div id="avaliacaoForm"></div>

<button
    class="details-btn"
    onclick="guardarAvaliacao()"
>
    Guardar Avaliação
</button>

    </div>

</div>

<script src="config.js"></script>

<script>

async function carregarColaboradores(){

    try{

        const token =
            localStorage.getItem(
                "accessToken"
            );

        const response =
            await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/UtilizadoresDashboard/items?$expand=fields`,

                {
                    headers:{
                        Authorization:
                            `Bearer ${token}`
                    }
                }

            );

        const data =
            await response.json();

        const select =
            document.getElementById(
                "colaboradorSelect"
            );

        select.innerHTML =
            '<option value="">Selecione...</option>';

        data.value.forEach(item => {

            const utilizador =
                item.fields;

            select.innerHTML += `

                <option
                    value="${utilizador.NumeroColaborador}"
                >
                    ${utilizador.NomeColaborador}
                    (${utilizador.Funcao})
                </option>

            `;

        });

    }
    catch(error){

        console.error(error);

    }

}
async function carregarModeloAvaliacao(){

    const numeroColaborador =
        document.getElementById("colaboradorSelect").value;

    if(!numeroColaborador){
        return;
    }

    const token =
        localStorage.getItem("accessToken");

    const utilizadoresResp = await fetch(
`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/UtilizadoresDashboard/items?$expand=fields`,
        {
            headers:{
                Authorization:`Bearer ${token}`
            }
        }
    );

    const utilizadoresData =
        await utilizadoresResp.json();

    const colaborador =
        utilizadoresData.value.find(item =>
            Number(item.fields.NumeroColaborador) === Number(numeroColaborador)
        ).fields;

    const configResp = await fetch(
`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/ConfiguracaoFuncoes/items?$expand=fields`,
        {
            headers:{
                Authorization:`Bearer ${token}`
            }
        }
    );

    const configData =
        await configResp.json();

    const modelo =
        configData.value.filter(item =>
            item.fields.NomeFuncao === colaborador.Funcao &&
            item.fields.Ativo === true
        );

  const form =
    document.getElementById("avaliacaoForm");

form.innerHTML = "";

const grupos = {

    RESULTADOS: [],
    EXECUCAO: [],
    ESTRATEGICO: [],
    SOFTSKILLS: []

};

modelo.forEach(item => {

    const campo =
        item.fields;

    if(
        campo.TipoConfiguracao ===
        "SOFTSKILL"
    ){

        grupos.SOFTSKILLS.push(campo);

    }
    else{

        grupos[
            campo.CategoriaAvaliacao
        ].push(campo);

    }

});

Object.keys(grupos).forEach(grupo => {

    if(grupos[grupo].length === 0){
        return;
    }

    let titulo = grupo;

    if(grupo === "EXECUCAO"){
        titulo = "EXECUÇÃO";
    }

    if(grupo === "ESTRATEGICO"){
        titulo = "ESTRATÉGICO";
    }

    if(grupo === "SOFTSKILLS"){
        titulo = "SOFT SKILLS";
    }

    form.innerHTML += `

        <div class="categoria-avaliacao">

            <h3>${titulo}</h3>

        </div>

    `;

    grupos[grupo].forEach(campo => {

        form.innerHTML += `

            <div class="eval-field">

                <label>

                    ${campo.NomeReferencia}

                    <span>

                        Peso:
                        ${campo.Peso}%

                    </span>

                </label>

                <input
    type="number"
    min="0"
    max="100"
    value="0"
    data-tipo="${campo.TipoConfiguracao}"
    data-referencia="${campo.ReferenciaID}"
    data-nome="${campo.NomeReferencia}"
    data-peso="${campo.Peso}"
    data-meta="${campo.MetaDefault}"
    data-categoria="${campo.CategoriaAvaliacao}"
>

            </div>

        `;

    });

});

}
document
    .getElementById("colaboradorSelect")
    .addEventListener(
        "change",
        carregarModeloAvaliacao
    );

carregarColaboradores();
async function guardarAvaliacao(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const numeroColaborador =
            document.getElementById("colaboradorSelect").value;

        if(!numeroColaborador){
            alert("Seleciona um colaborador.");
            return;
        }

        const utilizadoresResp = await fetch(
`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/UtilizadoresDashboard/items?$expand=fields`,
            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }
        );

        const utilizadoresData =
            await utilizadoresResp.json();

        const colaboradorItem =
            utilizadoresData.value.find(item =>
                Number(item.fields.NumeroColaborador) === Number(numeroColaborador)
            );

        const colaborador =
            colaboradorItem.fields;

        const avaliacaoID =
            "AV-" + new Date().toISOString().replace(/[-:.TZ]/g,"");

        const inputs =
            document.querySelectorAll("#avaliacaoForm input");

        for(const input of inputs){

            const tipo =
                input.dataset.tipo;

            const valor =
                Number(input.value) || 0;

            const peso =
                Number(input.dataset.peso) || 0;

            const meta =
                Number(input.dataset.meta) || 0;

            const nome =
                input.dataset.nome;

            const referenciaID =
                Number(input.dataset.referencia);
const categoria =
    input.dataset.categoria;
            let corEstado = "AMARELO";

            if(valor >= meta){
                corEstado = "VERDE";
            }

            if(valor < meta * 0.8){
                corEstado = "VERMELHO";
            }

            if(tipo === "KPI"){

                await fetch(
`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/HistoricoKPIs/items`,
                    {
                        method:"POST",
                        headers:{
                            Authorization:`Bearer ${token}`,
                            "Content-Type":"application/json"
                        },
                        body:JSON.stringify({
                            fields:{
                                Title:avaliacaoID + "-" + nome,
                                ColaboradorID:Number(colaborador.NumeroColaborador),
                                NomeColaborador:colaborador.NomeColaborador,
                                Funcao:colaborador.Funcao,
                                KPIID:referenciaID,
                                NomeKPI:nome,
                                ValorAtual:valor,
                                Meta:meta,
                                PesoKPI:peso,
                                Tendencia:"ESTAVEL",
                                CorEstado:corEstado,
                                AtualizadoPor:localStorage.getItem("userEmail") || "LOCAL",
                                DataAtualizacao:new Date().toISOString(),
                                SnapshotOficial:true,
                                AvaliacaoID:avaliacaoID
                            }
                        })
                    }
                );

            }

            if(tipo === "SOFTSKILL"){

                await fetch(
`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/HistoricoSoftSkills/items`,
                    {
                        method:"POST",
                        headers:{
                            Authorization:`Bearer ${token}`,
                            "Content-Type":"application/json"
                        },
                        body:JSON.stringify({
                            fields:{
                                Title:avaliacaoID + "-" + nome,
                                ColaboradorID:Number(colaborador.NumeroColaborador),
                                NomeColaborador:colaborador.NomeColaborador,
                                SkillID:referenciaID,
                                NomeSkill:nome,
                                ValorAtual:valor,
                                PesoSkill:peso,
                                CorEstado:corEstado,
                                AtualizadoPor:localStorage.getItem("userEmail") || "LOCAL",
                                DataAtualizacao:new Date().toISOString(),
                                SnapshotOficial:true,
                                AvaliacaoID:avaliacaoID,
CategoriaAvaliacao:categoria
                            }
                        })
                    }
                );

            }

        }

        alert("Avaliação guardada com sucesso.");

    }
    catch(error){

        console.error(error);
        alert("Erro ao guardar avaliação.");

    }

}
</script>

</body>
</html>
