<script src="config.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>    
<script>

const msalConfig = {

    auth:{

        clientId: CONFIG.clientId,

        authority:
            `https://login.microsoftonline.com/${CONFIG.tenantId}`,

        redirectUri:
            CONFIG.redirectUri

    }

};

const msalInstance =
    new msal.PublicClientApplication(msalConfig);

async function renovarToken(){

    try{

        const account =
            JSON.parse(
                localStorage.getItem("account")
            );

        if(!account){

            window.location.href =
                "index.html";

            return;

        }

        const tokenResponse =
            await msalInstance.acquireTokenSilent({

                scopes: CONFIG.scopes,

                account: account

            });

        localStorage.setItem(
            "accessToken",
            tokenResponse.accessToken
        );

    }
    catch(error){

        console.error(error);

        localStorage.clear();

        window.location.href =
            "index.html";

    }

}

</script>

<script>

async function carregarUtilizador(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/UtilizadoresDashboard/items?$expand=fields`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const data =
            await response.json();

        const tipoLogin =
            localStorage.getItem("tipoLogin");

        let utilizadorItem = null;

        if(tipoLogin === "LOCAL"){

            const numeroLocal =
                Number(
                    localStorage.getItem(
                        "numeroLocal"
                    )
                );

            utilizadorItem =
                data.value.find(item => {

                    return Number(
                        item.fields.NumeroColaborador
                    ) === numeroLocal;

                });

        }
        else{

            const emailMicrosoft =
                localStorage.getItem(
                    "userEmail"
                );

            utilizadorItem =
                data.value.find(item => {

                    return item.fields.EmailMicrosoft ===
                        emailMicrosoft;

                });

        }

        if(!utilizadorItem){

            alert("Utilizador não encontrado.");

            return;

        }

        const utilizador =
            utilizadorItem.fields;

        window.colaboradorAtual =
            utilizador;
document.getElementById(
    "detailsBtn"
).onclick = function(){

    window.location.href =
`colaborador.html?id=${utilizador.NumeroColaborador}`;

};        
window.tipoUtilizador =
    utilizador.TipoUtilizador;
if(
    utilizador.TipoUtilizador === "ADMIN"
    ||
    utilizador.TipoUtilizador === "CHEFIA"
){

    document.getElementById(
        "teamBtn"
    ).style.display = "block";

}        
        localStorage.setItem(
    "tipoUtilizador",
    utilizador.TipoUtilizador
);
        document.getElementById("topUser").innerHTML =
            utilizador.NomeColaborador;

        document.getElementById("summaryRole").innerHTML =
            utilizador.Funcao;

        await carregarFotoPerfil(
            utilizador.FotoPerfil
        );

    }
    catch(error){

        console.error(error);

    }

}

async function carregarFotoPerfil(caminhoFoto){

    try{

        const token =
            localStorage.getItem("accessToken");

        if(!caminhoFoto){

            document.getElementById("profileImage").src =
                "https://ui-avatars.com/api/?name=User&background=5f7752&color=fff";

            return;

        }

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/drive/root:/${caminhoFoto}:/content`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const blob =
            await response.blob();

        const imageUrl =
            URL.createObjectURL(blob);

        document.getElementById("profileImage").src =
            imageUrl;

    }
    catch(error){

        console.error(
            "Erro ao carregar foto:",
            error
        );

    }

}

async function carregarKPIs(){

    try{

        const token = localStorage.getItem("accessToken");

        const colaboradorID =
            Number(window.colaboradorAtual.NumeroColaborador);

        const funcao =
            window.colaboradorAtual.Funcao;

        const configResp = await fetch(
`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/ConfiguracaoFuncoes/items?$expand=fields`,
            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }
        );

        const configData = await configResp.json();

        const modeloKPIs = configData.value
            .map(item => item.fields)
            .filter(item =>
                item.NomeFuncao === funcao &&
                item.TipoConfiguracao === "KPI" &&
                (item.Ativo === true || item.Ativo === "Sim" || item.Ativo === "SIM")
            );

        const histResp = await fetch(
`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/HistoricoKPIs/items?$expand=fields`,
            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }
        );

        const histData = await histResp.json();

        const historico = histData.value
            .map(item => item.fields)
            .filter(item =>
                Number(item.ColaboradorID) === colaboradorID &&
                item.SnapshotOficial === true &&
                item.AvaliacaoID
            );

        historico.sort((a,b) =>
            new Date(b.DataAtualizacao) - new Date(a.DataAtualizacao)
        );

        const ultimaAvaliacaoID =
            historico.length > 0 ? historico[0].AvaliacaoID : "";

        const dataUltimaAvaliacao =
            historico.length > 0
            ? new Date(historico[0].DataAtualizacao).toLocaleDateString("pt-PT")
            : "";

        const ultimaAvaliacao =
            historico.filter(item =>
                item.AvaliacaoID === ultimaAvaliacaoID
            );

        const grupos = {
            RESULTADOS:{
                scoreId:"resultadosScore",
                containerId:"resultadosKPIs",
                soma:0,
                peso:0
            },
            EXECUCAO:{
                scoreId:"execucaoScore",
                containerId:"execucaoKPIs",
                soma:0,
                peso:0
            },
            ESTRATEGICO:{
                scoreId:"estrategicoScore",
                containerId:"estrategicoKPIs",
                soma:0,
                peso:0
            }
        };

        Object.values(grupos).forEach(grupo => {
            document.getElementById(grupo.containerId).innerHTML = "";
            document.getElementById(grupo.scoreId).innerHTML = "0/100";
        });

        let somaFinal = 0;
        let pesoFinal = 0;

        modeloKPIs.forEach(modelo => {

            let categoria =
                String(modelo.CategoriaAvaliacao || "")
                    .trim()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toUpperCase();

            const nomeNormalizado =
                String(modelo.NomeReferencia || "")
                    .trim()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toUpperCase();

            const isResultadoTransversal =
                nomeNormalizado.includes("EBITDA")
                ||
                nomeNormalizado.includes("WORKING CAPITAL");

            if(categoria === "RESULTADOS" && !isResultadoTransversal){
                categoria = "EXECUCAO";
            }

            if(!grupos[categoria]){
                return;
            }

            const nomeModeloNormalizado =
    String(modelo.NomeReferencia || "")
        .trim()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toUpperCase();

const historicoKPI =
    ultimaAvaliacao.find(item => {

        const nomeHistoricoNormalizado =
            String(item.NomeKPI || "")
                .trim()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toUpperCase();

        return Number(item.KPIID) === Number(modelo.ReferenciaID)
            ||
            nomeHistoricoNormalizado === nomeModeloNormalizado;

    });

            const valor =
                historicoKPI
                ? Number(historicoKPI.ValorAtual) || 0
                : 0;

            const peso =
                Number(modelo.Peso) || 0;

            grupos[categoria].soma += valor * peso;
            grupos[categoria].peso += peso;

            somaFinal += valor * peso;
            pesoFinal += peso;

            document.getElementById(
                grupos[categoria].containerId
            ).innerHTML += `

                <div class="category-kpi-row">

                    <div class="category-kpi-name">
                        ${modelo.NomeReferencia}
                    </div>

                    <div class="category-kpi-value">
                        ${valor}
                    </div>

                </div>

            `;

        });

        Object.keys(grupos).forEach(categoria => {

            const grupo = grupos[categoria];

            const score =
                grupo.peso > 0
                ? Math.round(grupo.soma / grupo.peso)
                : 0;

            document.getElementById(grupo.scoreId).innerHTML =
                `${score}/100`;

        });

        const overall =
            pesoFinal > 0
            ? Math.round(somaFinal / pesoFinal)
            : 0;

        document.getElementById("overallScore").innerHTML =
            overall;

        document.getElementById("summaryMessage").innerHTML =
            overall >= 85
            ? "Performance global excelente"
            : overall >= 70
            ? "Performance consistente"
            : "Necessita atenção em KPIs críticos";

        document.getElementById("summaryTrend").innerHTML =
            dataUltimaAvaliacao
            ? `Última avaliação: ${dataUltimaAvaliacao}`
            : "Ainda sem avaliação registada";

    }
    catch(error){

        console.error(error);

    }

}
function logout(){

    localStorage.clear();

    window.location.href =
        "index.html";

}
async function iniciarDashboard(){

    await renovarToken();

    await carregarUtilizador();

    await carregarKPIs();

    await carregarRadar();
    
}

iniciarDashboard();
</script>  
<script>

let radarChart = null;

async function carregarRadar(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const colaboradorID =
            Number(
                window.colaboradorAtual.NumeroColaborador
            );

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/HistoricoSoftSkills/items?$expand=fields`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const data =
            await response.json();

        const historicoColaborador =
            data.value.filter(item => {

                return Number(
                    item.fields.ColaboradorID
                ) === colaboradorID

                &&

                item.fields.SnapshotOficial === true;

            });

        if(historicoColaborador.length === 0){

            return;

        }

        historicoColaborador.sort((a,b) => {

            return new Date(
                b.fields.DataAtualizacao
            )
            -
            new Date(
                a.fields.DataAtualizacao
            );

        });

        const ultimaAvaliacaoID =
            historicoColaborador[0].fields.AvaliacaoID;

        const skills =
            historicoColaborador.filter(item => {

                return item.fields.AvaliacaoID ===
                    ultimaAvaliacaoID;

            });

        const labels =
            skills.map(item =>
                item.fields.NomeSkill
            );

        const valores =
            skills.map(item =>
                Number(item.fields.ValorAtual) || 0
            );

        const radarCtx =
            document.getElementById(
                "radarChart"
            );

        if(radarChart){
            radarChart.destroy();
        }

        radarChart = new Chart(radarCtx, {

            type:"radar",

            data:{

                labels:labels,

                datasets:[{

                    label:"Soft Skills",

                    data:valores,

                    backgroundColor:
                        "rgba(95,119,82,0.2)",

                    borderColor:
                        "#5f7752",

                    borderWidth:3,

                    pointBackgroundColor:
                        "#5f7752",

                    pointRadius:4

                }]

            },

            options:{

                responsive:true,

                maintainAspectRatio:false,

                plugins:{
                    legend:{
                        display:false
                    }
                },

                scales:{
                    r:{
                        suggestedMin:0,
                        suggestedMax:100,

                        ticks:{
                            display:false
                        },

                        grid:{
                            color:"#e5e7eb"
                        },

                        angleLines:{
                            color:"#e5e7eb"
                        },

                        pointLabels:{
    display:false
}
                    }
                }

            }

        });

    }
    catch(error){

        console.error(error);

    }

}

</script>
