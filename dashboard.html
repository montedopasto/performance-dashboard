<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Performance Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <div class="topbar">

        <div class="logo-area">

            <div class="logo-circle"></div>

            <div>
                <div class="logo-title">
                    Monte do Pasto
                </div>

                <div class="logo-subtitle">
                    Performance Dashboard
                </div>
            </div>

        </div>

        <div class="topbar-right">

            <div class="top-user" id="topUser"></div>

        </div>

    </div>

    <div class="summary-card">

        <div class="summary-left">

            <img
                src="https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=500"
                class="profile-image"
            >

        </div>

        <div class="summary-right">

            <div class="summary-role" id="summaryRole"></div>

            <div class="summary-score">

    <span id="overallScore">
    0
</span>

    <span>Pontos</span>

</div>

            <div class="summary-message" id="summaryMessage">
</div>

            <div class="summary-trend" id="summaryTrend">
</div>

        </div>

    </div>
<div class="kpi-grid" id="kpiGrid"></div>
<div class="bottom-grid">

    <div class="radar-card">

        <div class="section-title">
            Soft Skills
        </div>

        <div class="radar-wrapper">
    <canvas id="radarChart"></canvas>
</div>

    </div>

</div>    
</div>
<script src="config.js"></script>
<script>

if(!localStorage.getItem("accessToken")){

    window.location.href = "index.html";

}

</script>

<script>

async function carregarUtilizador(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/UtilizadoresDashboard/items?$expand=fields`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const data = await response.json();

        console.log(data);

        const emailMicrosoft =
    localStorage.getItem("userEmail");

const utilizadorItem = data.value.find(item => {

    return item.fields.EmailMicrosoft ===
        emailMicrosoft;

});

if(!utilizadorItem){

    alert("Utilizador não encontrado.");

    return;

}

const utilizador =
    utilizadorItem.fields;
window.colaboradorAtual =
    utilizador;
        document.getElementById("topUser").innerHTML =
            utilizador.NomeColaborador;

        document.getElementById("summaryRole").innerHTML =
            utilizador.Funcao;

    }
    catch(error){

        console.error(error);

    }

}

async function carregarKPIs(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/HistoricoKPIs/items?$expand=fields`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const data = await response.json();

        console.log(data);

        const grid =
            document.getElementById("kpiGrid");

        grid.innerHTML = "";
        let somaScores = 0;
let totalKPIs = 0;
        const colaboradorID =
    Number(window.colaboradorAtual.NumeroColaborador);

const historicoFiltrado =
    data.value.filter(item => {

        return Number(item.fields.ColaboradorID) ===
            Number(colaboradorID);

    });

historicoFiltrado.forEach(item => {
console.log(historicoFiltrado);
            const kpi = item.fields;
console.log("KPI REAL:", kpi);
            let estadoClasse = "positive";

            if(kpi.CorEstado === "AMARELO"){
    estadoClasse = "warning";
}

if(kpi.CorEstado === "VERMELHO"){
    estadoClasse = "negative";
}

            const valorReal =
    Number(kpi.ValorAtual) || 0;

const metaReal =
    Number(kpi.Meta) || 0;

            const html = `

                <div class="kpi-card ${estadoClasse}">

                    <div class="kpi-top">

                        <div>

                            <div class="kpi-title">
                                ${kpi.NomeKPI}
                            </div>

                            <div class="kpi-target">
                                Meta: ${metaReal}
                            </div>

                        </div>

                        <div class="kpi-status">
                            ${kpi.Tendencia === "SUBIDA" ? "↑" : ""}

${kpi.Tendencia === "DESCIDA" ? "↓" : ""}

${kpi.Tendencia === "ESTAVEL" ? "•" : ""}
                        </div>

                    </div>

                    <div class="kpi-value">
                        ${valorReal}
                    </div>

                    <div class="sparkline">

                        <div
                            class="spark-fill"
                            style="width:${valorReal}%"
                        ></div>

                    </div>

                </div>

            `;

            grid.innerHTML += html;
somaScores += valorReal;
totalKPIs++;
        });

const overall =
    Math.round(somaScores / totalKPIs);

document.getElementById("overallScore")
    .innerHTML = overall;

let mensagem = "";

if(overall >= 85){

    mensagem =
        "Performance global excelente";

}
else if(overall >= 70){

    mensagem =
        "Performance consistente";

}
else{

    mensagem =
        "Necessita atenção em KPIs críticos";

}

document.getElementById("summaryMessage")
    .innerHTML = mensagem;

document.getElementById("summaryTrend")
    .innerHTML = "↑ Dashboard atualizado em tempo real";

}
catch(error){

        console.error(error);

    }

}

async function iniciarDashboard(){

    await carregarUtilizador();

    await carregarKPIs();

    await carregarRadar();

}

iniciarDashboard();
</script>  
<script>

let radarChart = null;

async function carregarRadar(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const colaboradorID =
    Number(window.colaboradorAtual.NumeroColaborador);

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/HistoricoSoftSkills/items?$expand=fields`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const data = await response.json();

        const skills =
            data.value.filter(item => {

                return item.fields.ColaboradorID ==
                    colaboradorID;

            });

        const labels =
            skills.map(item =>
                item.fields.NomeSkill
            );

        const valores =
            skills.map(item =>
                item.fields.ValorAtual
            );

        const radarCtx =
            document.getElementById('radarChart');

        if(radarChart){
            radarChart.destroy();
        }

        radarChart = new Chart(radarCtx, {

            type:'radar',

            data:{

                labels:labels,

                datasets:[{

                    label:'Soft Skills',

                    data:valores,

                    backgroundColor:'rgba(95,119,82,0.2)',

                    borderColor:'#5f7752',

                    borderWidth:3,

                    pointBackgroundColor:'#5f7752',

                    pointRadius:4

                }]

            },

            options:{

                responsive:true,

                maintainAspectRatio:false,

                plugins:{
                    legend:{
                        display:false
                    }
                },

                scales:{
                    r:{
                        suggestedMin:0,
                        suggestedMax:100,

                        ticks:{
                            display:false
                        },

                        grid:{
                            color:'#e5e7eb'
                        },

                        angleLines:{
                            color:'#e5e7eb'
                        },

                        pointLabels:{
                            color:'#374151',
                            font:{
                                size:14,
                                weight:'600'
                            }
                        }
                    }
                }

            }

        });

    }
    catch(error){

        console.error(error);

    }

}

</script>
</body>
</html>
