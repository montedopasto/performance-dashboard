<script src="config.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>    
<script>

const msalConfig = {

    auth:{

        clientId: CONFIG.clientId,

        authority:
            `https://login.microsoftonline.com/${CONFIG.tenantId}`,

        redirectUri:
            CONFIG.redirectUri

    }

};

const msalInstance =
    new msal.PublicClientApplication(msalConfig);

async function renovarToken(){

    try{

        const account =
            JSON.parse(
                localStorage.getItem("account")
            );

        if(!account){

            window.location.href =
                "index.html";

            return;

        }

        const tokenResponse =
            await msalInstance.acquireTokenSilent({

                scopes: CONFIG.scopes,

                account: account

            });

        localStorage.setItem(
            "accessToken",
            tokenResponse.accessToken
        );

    }
    catch(error){

        console.error(error);

        localStorage.clear();

        window.location.href =
            "index.html";

    }

}

</script>

<script>

async function carregarUtilizador(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/UtilizadoresDashboard/items?$expand=fields`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const data =
            await response.json();

        const tipoLogin =
            localStorage.getItem("tipoLogin");

        let utilizadorItem = null;

        if(tipoLogin === "LOCAL"){

            const numeroLocal =
                Number(
                    localStorage.getItem(
                        "numeroLocal"
                    )
                );

            utilizadorItem =
                data.value.find(item => {

                    return Number(
                        item.fields.NumeroColaborador
                    ) === numeroLocal;

                });

        }
        else{

            const emailMicrosoft =
                localStorage.getItem(
                    "userEmail"
                );

            utilizadorItem =
                data.value.find(item => {

                    return item.fields.EmailMicrosoft ===
                        emailMicrosoft;

                });

        }

        if(!utilizadorItem){

            alert("Utilizador não encontrado.");

            return;

        }

        const utilizador =
            utilizadorItem.fields;

        window.colaboradorAtual =
            utilizador;
document.getElementById(
    "detailsBtn"
).onclick = function(){

    window.location.href =
`colaborador.html?id=${utilizador.NumeroColaborador}`;

};        
window.tipoUtilizador =
    utilizador.TipoUtilizador;
if(
    utilizador.TipoUtilizador === "ADMIN"
    ||
    utilizador.TipoUtilizador === "CHEFIA"
){

    document.getElementById(
        "teamBtn"
    ).style.display = "block";

}        
        localStorage.setItem(
    "tipoUtilizador",
    utilizador.TipoUtilizador
);
        document.getElementById("topUser").innerHTML =
            utilizador.NomeColaborador;

        document.getElementById("summaryRole").innerHTML =
            utilizador.Funcao;

        await carregarFotoPerfil(
            utilizador.FotoPerfil
        );

    }
    catch(error){

        console.error(error);

    }

}

async function carregarFotoPerfil(caminhoFoto){

    try{

        const token =
            localStorage.getItem("accessToken");

        if(!caminhoFoto){

            document.getElementById("profileImage").src =
                "https://ui-avatars.com/api/?name=User&background=5f7752&color=fff";

            return;

        }

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/drive/root:/${caminhoFoto}:/content`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const blob =
            await response.blob();

        const imageUrl =
            URL.createObjectURL(blob);

        document.getElementById("profileImage").src =
            imageUrl;

    }
    catch(error){

        console.error(
            "Erro ao carregar foto:",
            error
        );

    }

}

async function carregarKPIs(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const colaboradorID =
            Number(
                window.colaboradorAtual.NumeroColaborador
            );

        const funcao =
            window.colaboradorAtual.Funcao;

        const configResp =
            await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/ConfiguracaoFuncoes/items?$expand=fields`,

                {
                    headers:{
                        Authorization:`Bearer ${token}`
                    }
                }

            );

        const configData =
            await configResp.json();

        const modeloKPIs =
            configData.value
                .map(item => item.fields)
                .filter(item => {

                    return item.NomeFuncao === funcao
                    &&
                    item.TipoConfiguracao === "KPI"
                    &&
                    item.Ativo === true;

                })
                .sort((a,b) => {

                    return Number(a.OrdemVisual) -
                        Number(b.OrdemVisual);

                });

        const historicoResp =
            await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/HistoricoKPIs/items?$expand=fields`,

                {
                    headers:{
                        Authorization:`Bearer ${token}`
                    }
                }

            );

        const historicoData =
            await historicoResp.json();

        const historicoColaborador =
            historicoData.value
                .map(item => item.fields)
                .filter(item => {

                    return Number(item.ColaboradorID) === colaboradorID
                    &&
                    item.SnapshotOficial === true
                    &&
                    item.AvaliacaoID;

                });

        let ultimaAvaliacaoID = "";

        if(historicoColaborador.length > 0){

            historicoColaborador.sort((a,b) => {

                return new Date(b.DataAtualizacao) -
                    new Date(a.DataAtualizacao);

            });

            ultimaAvaliacaoID =
                historicoColaborador[0].AvaliacaoID;

        }

        const historicoUltima =
            historicoColaborador.filter(item => {

                return item.AvaliacaoID ===
                    ultimaAvaliacaoID;

            });

        const grid =
            document.getElementById("kpiGrid");

        grid.innerHTML = "";

        let somaPonderada = 0;
        let somaPesos = 0;

        modeloKPIs.forEach(kpiModelo => {

            const historico =
                historicoUltima.find(item => {

                    return Number(item.KPIID) ===
                        Number(kpiModelo.ReferenciaID);

                });

            const valorReal =
                historico
                ?
                Number(historico.ValorAtual) || 0
                :
                0;

            const metaReal =
                Number(kpiModelo.MetaDefault) || 0;

            const peso =
                Number(kpiModelo.Peso) || 0;

            let corEstado =
                historico?.CorEstado || "AMARELO";

            let estadoClasse =
                "warning";

            if(corEstado === "VERDE"){
                estadoClasse = "positive";
            }

            if(corEstado === "VERMELHO"){
                estadoClasse = "negative";
            }

            somaPonderada +=
                valorReal * peso;

            somaPesos +=
                peso;

            const html = `

                <div class="kpi-card ${estadoClasse}">

                    <div class="kpi-top">

                        <div>

                            <div class="kpi-title">
                                ${kpiModelo.NomeReferencia}
                            </div>

                            <div class="kpi-target">
                                ${kpiModelo.CategoriaAvaliacao} · Meta: ${metaReal} · Peso: ${peso}%
                            </div>

                        </div>

                        <div class="kpi-status">
                            ${historico?.Tendencia === "SUBIDA" ? "↑" : ""}
                            ${historico?.Tendencia === "DESCIDA" ? "↓" : ""}
                            ${!historico || historico?.Tendencia === "ESTAVEL" ? "•" : ""}
                        </div>

                    </div>

                    <div class="kpi-value">
                        ${valorReal}
                    </div>

                    <div class="sparkline">

                        <div
                            class="spark-fill"
                            style="width:${valorReal}%"
                        ></div>

                    </div>

                </div>

            `;

            grid.innerHTML += html;

        });

        const overall =
            somaPesos > 0
            ?
            Math.round(
                somaPonderada / somaPesos
            )
            :
            0;

        document.getElementById("overallScore").innerHTML =
            overall;

        let mensagem = "";

        if(overall >= 85){
            mensagem = "Performance global excelente";
        }
        else if(overall >= 70){
            mensagem = "Performance consistente";
        }
        else{
            mensagem = "Necessita atenção em KPIs críticos";
        }

        document.getElementById("summaryMessage").innerHTML =
            mensagem;

        document.getElementById("summaryTrend").innerHTML =
            ultimaAvaliacaoID
            ?
            `Última avaliação: ${ultimaAvaliacaoID}`
            :
            "Ainda sem avaliação registada";

    }
    catch(error){

        console.error(error);

    }

}
function logout(){

    localStorage.clear();

    window.location.href =
        "index.html";

}
async function iniciarDashboard(){

    await renovarToken();

    await carregarUtilizador();

    await carregarKPIs();

    await carregarRadar();
    
}

iniciarDashboard();
</script>  
<script>

let radarChart = null;

async function carregarRadar(){

    try{

        const token =
            localStorage.getItem("accessToken");

        const colaboradorID =
            Number(
                window.colaboradorAtual.NumeroColaborador
            );

        const response = await fetch(

`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/lists/HistoricoSoftSkills/items?$expand=fields`,

            {
                headers:{
                    Authorization:`Bearer ${token}`
                }
            }

        );

        const data =
            await response.json();

        const historicoColaborador =
            data.value.filter(item => {

                return Number(
                    item.fields.ColaboradorID
                ) === colaboradorID

                &&

                item.fields.SnapshotOficial === true;

            });

        if(historicoColaborador.length === 0){

            return;

        }

        historicoColaborador.sort((a,b) => {

            return new Date(
                b.fields.DataAtualizacao
            )
            -
            new Date(
                a.fields.DataAtualizacao
            );

        });

        const ultimaAvaliacaoID =
            historicoColaborador[0].fields.AvaliacaoID;

        const skills =
            historicoColaborador.filter(item => {

                return item.fields.AvaliacaoID ===
                    ultimaAvaliacaoID;

            });

        const labels =
            skills.map(item =>
                item.fields.NomeSkill
            );

        const valores =
            skills.map(item =>
                Number(item.fields.ValorAtual) || 0
            );

        const radarCtx =
            document.getElementById(
                "radarChart"
            );

        if(radarChart){
            radarChart.destroy();
        }

        radarChart = new Chart(radarCtx, {

            type:"radar",

            data:{

                labels:labels,

                datasets:[{

                    label:"Soft Skills",

                    data:valores,

                    backgroundColor:
                        "rgba(95,119,82,0.2)",

                    borderColor:
                        "#5f7752",

                    borderWidth:3,

                    pointBackgroundColor:
                        "#5f7752",

                    pointRadius:4

                }]

            },

            options:{

                responsive:true,

                maintainAspectRatio:false,

                plugins:{
                    legend:{
                        display:false
                    }
                },

                scales:{
                    r:{
                        suggestedMin:0,
                        suggestedMax:100,

                        ticks:{
                            display:false
                        },

                        grid:{
                            color:"#e5e7eb"
                        },

                        angleLines:{
                            color:"#e5e7eb"
                        },

                        pointLabels:{
                            color:"#374151",

                            font:{
                                size:14,
                                weight:"600"
                            }
                        }
                    }
                }

            }

        });

    }
    catch(error){

        console.error(error);

    }

}

</script>
