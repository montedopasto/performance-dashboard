<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Performance Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <div class="topbar">

        <div class="logo-area">

            <div class="logo-circle"></div>

            <div>
                <div class="logo-title">
                    Monte do Pasto
                </div>

                <div class="logo-subtitle">
                    Performance Dashboard
                </div>
            </div>

        </div>

        <div class="topbar-right">

            <div class="top-user">
                José Almanso
            </div>

        </div>

    </div>

    <div class="summary-card">

        <div class="summary-left">

            <img
                src="https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=500"
                class="profile-image"
            >

        </div>

        <div class="summary-right">

            <div class="summary-role">
                CFO Avaliação
            </div>

            <div class="summary-score">
                82
                <span>Pontos</span>
            </div>

            <div class="summary-message">
                Performance consistente nos últimos 90 dias
            </div>

            <div class="summary-trend">
                ↑ +4 pontos desde última atualização
            </div>

        </div>

    </div>
<div class="kpi-grid">

    <div class="kpi-card positive">

        <div class="kpi-top">

            <div>
                <div class="kpi-title">
                    EBITDA vs Budget
                </div>

                <div class="kpi-target">
                    Meta: 90
                </div>
            </div>

            <div class="kpi-status">
                ↑
            </div>

        </div>

        <div class="kpi-value">
            82
        </div>

        <div class="sparkline">
            <div class="spark-fill"></div>
        </div>

    </div>

    <div class="kpi-card warning">

        <div class="kpi-top">

            <div>
                <div class="kpi-title">
                    Working Capital
                </div>

                <div class="kpi-target">
                    Meta: 80
                </div>
            </div>

            <div class="kpi-status">
                !
            </div>

        </div>

        <div class="kpi-value">
            71
        </div>

        <div class="sparkline">
            <div class="spark-fill warning-fill"></div>
        </div>

    </div>

    <div class="kpi-card negative">

        <div class="kpi-top">

            <div>
                <div class="kpi-title">
                    Reporting Mensal
                </div>

                <div class="kpi-target">
                    Meta: 95
                </div>
            </div>

            <div class="kpi-status">
                ↓
            </div>

        </div>

        <div class="kpi-value">
            58
        </div>

        <div class="sparkline">
            <div class="spark-fill negative-fill"></div>
        </div>

    </div>

</div>
</div>

</body>
</html>
